# =============================================================================
# CI 门禁 (Verify CI) — PR 合并门禁
# -----------------------------------------------------------------------------
# 原则:每个 PR 都必须过这道门。没有任何 job 可选,没有人工绕过。
#       流水线是确定性的,所以 agent 能预测结果、能推理失败。
#
# 本仓适配(单仓多项目):前端 apps/web(pnpm)+ 后端 services/(Go)。
#   各语言 job 用 paths 过滤,只有相关代码变更时才跑——既快又不漏。
#   go 版本从 services/go.mod 读(不硬编码),保证 CI == 本地。
# =============================================================================
name: CI (Verify)

on:
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # 检测哪些部分发生了变更,后续 job 据此决定是否运行
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            go:
              - 'services/**/*.go'
              - 'services/go.mod'
              - 'services/go.sum'
              - 'services/Makefile'
              - 'services/.golangci.yml'

  # 前端:类型检查 + lint + 单测(pnpm workspace)
  web-quality:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Unit tests
        run: pnpm test

  # 后端 Go:格式检查 + 编译 + 单测(= services/Makefile 的 verify,与本地一致)
  go-verify:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/go.mod   # 从 go.mod 读版本,不硬编码
          cache: true
          cache-dependency-path: services/go.sum
      - name: make verify (fmtcheck + build + test)
        run: make -C services verify

  # 后端 Go Lint:golangci-lint(配置见 services/.golangci.yml)。
  #   only-new-issues:只对本 PR 新增/改动代码阻断,不逼一次还清历史债。
  go-lint:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # only-new-issues 需与 base 求 diff
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/go.mod
          cache: true
          cache-dependency-path: services/go.sum
      - name: golangci-lint (仅新增/改动代码阻断)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: services
          only-new-issues: true

  # 汇总门禁:设为唯一的 required status check。任意上游失败 → 红。
  ci-gate:
    needs: [web-quality, go-verify, go-lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        run: |
          results='${{ join(needs.*.result, ' ') }}'
          echo "Upstream results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::CI gate failed — a required job did not pass."
              exit 1
            fi
          done
          echo "✅ CI gate green."
