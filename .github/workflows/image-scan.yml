# =============================================================================
# 镜像 / 文件系统 漏洞扫描门禁(v2.5.1 — 修了 SARIF 误报)
# -----------------------------------------------------------------------------
# 双扫:
#   ① 文件系统(repo 本身的依赖、Dockerfile 配置)→ 不需要构建镜像
#   ② 每个 Dockerfile 构建后的镜像 → 真实运行时镜像里的 CVE
#
# 严重度阈值默认 CRITICAL,HIGH(可在 Repo Vars TRIVY_SEVERITY 调)
# 任意命中 → BLOCK
#
# v2.5.1 修的 bug(与 secret-scan 同根):
#   旧版 Upload SARIF 用 `if: always()`,如果仓库没启用 Code Scanning 就上传失败 →
#   整个 job 失败 → image-scan-gate 误以为"扫到 CVE"。
#   修法:
#   1) scan step 用 continue-on-error,捕获真实结果到 steps.<id>.outcome
#   2) Upload SARIF 也 continue-on-error,上传失败只警告不污染门禁
#   3) 显式补一个 "fail if real CVE" step,基于 scan outcome 判定
#
# 启用:拷到 .github/workflows/,即用。无需额外 secret。
# 关闭某些已确认的 CVE:加 .trivyignore(每行一个 CVE ID),Trivy 自动读
# =============================================================================
name: Image Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'      # 每天 03:00 UTC 扫一次(新 CVE 可能针对老镜像)

permissions:
  contents: read
  security-events: write     # 上传 SARIF 到 GitHub Security 标签

concurrency:
  group: image-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fs-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # v2.5.1 关键修复:scan 与 upload 都 continue-on-error,门禁键控 scan 自己的 outcome
      - name: Trivy filesystem scan
        id: trivy-fs
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: ${{ vars.TRIVY_SEVERITY || 'CRITICAL,HIGH' }}
          exit-code: '1'                # 命中即 step fail
          ignore-unfixed: 'true'        # 没有 fix 的 CVE 暂不挡(避免无解烦人)
          format: 'sarif'
          output: 'trivy-fs.sarif'
      - name: Upload SARIF to GitHub Security (best-effort)
        if: always() && hashFiles('trivy-fs.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-fs'
      - name: Fail job if Trivy fs scan found CVEs
        if: steps.trivy-fs.outcome == 'failure'
        run: |
          echo "::error::Trivy fs scan found CRITICAL/HIGH CVEs — see Security tab"
          exit 1

  discover-dockerfiles:
    runs-on: ubuntu-latest
    outputs:
      dockerfiles: ${{ steps.list.outputs.dockerfiles }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          arr=$(find . -name Dockerfile -not -path './node_modules/*' -not -path './_aifcl/*' \
                | python3 -c 'import sys,json; print(json.dumps([l.strip() for l in sys.stdin]))')
          echo "dockerfiles=$arr" >> $GITHUB_OUTPUT
          echo "找到 Dockerfile:$arr"

  image-scan:
    needs: discover-dockerfiles
    if: needs.discover-dockerfiles.outputs.dockerfiles != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile: ${{ fromJSON(needs.discover-dockerfiles.outputs.dockerfiles) }}
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          ctx="$(dirname '${{ matrix.dockerfile }}')"
          tag="scan/$(basename $ctx):${{ github.sha }}"
          docker build -t "$tag" -f "${{ matrix.dockerfile }}" "$ctx"
          echo "IMAGE=$tag" >> $GITHUB_ENV
      # v2.5.1 同样的修复模式
      - name: Trivy image scan
        id: trivy-image
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}
          severity: ${{ vars.TRIVY_SEVERITY || 'CRITICAL,HIGH' }}
          exit-code: '1'
          ignore-unfixed: 'true'
          format: 'sarif'
          output: 'trivy-image.sarif'
      - name: Upload SARIF (best-effort)
        if: always() && hashFiles('trivy-image.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image.sarif'
          category: 'trivy-image-${{ matrix.dockerfile }}'
      - name: Fail job if Trivy image scan found CVEs
        if: steps.trivy-image.outcome == 'failure'
        run: |
          echo "::error::Trivy image scan (${{ matrix.dockerfile }}) found CRITICAL/HIGH CVEs"
          exit 1

  image-scan-gate:
    needs: [fs-scan, image-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        run: |
          for r in '${{ needs.fs-scan.result }}' '${{ needs.image-scan.result }}'; do
            if [ "$r" = "failure" ]; then
              echo "::error::image-scan-gate 失败 — Security 标签里看 SARIF 详情。"
              exit 1
            fi
          done
          echo "✅ image-scan-gate green."
