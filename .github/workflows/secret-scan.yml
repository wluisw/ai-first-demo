# =============================================================================
# 机密扫描门禁(v2.5.1 — 修了 SARIF 误报)
# -----------------------------------------------------------------------------
# 用 gitleaks 扫:
#   - PR diff(把刚提交进来的 token/key 揪出来)
#   - 历史(weekly schedule 时全仓扫一次,补救老 commit 里的泄漏)
#
# 真命中 → BLOCK。结果以 SARIF 上传到 GitHub Security 标签,方便长期跟踪。
#
# v2.5.1 修的 bug:
#   旧版 Upload SARIF 用 `if: always()`,如果仓库没启用 Code Scanning(私有仓无 GHAS、
#   公开仓没"Set up code scanning")就上传失败 → 整个 job 失败 → 门禁误判"发现密钥"。
#   修法:
#   1) scan step 用 `continue-on-error: true` 捕获实际结果到 steps.scan.outcome
#   2) Upload SARIF 也 `continue-on-error: true` —— 上传失败只警告,不污染门禁
#   3) Comment on PR 和 job-fail 显式键控 `steps.scan.outcome == 'failure'`,
#      只在"真的扫到泄漏"时才触发,不再被无关失败带跑
#
# 启用:拷到 .github/workflows/,即用。无需 secret(用 GITHUB_TOKEN 内置)。
# 强烈建议把 secret-scan-gate 设为 main 的 required check。
#
# False positive 屏蔽:在 repo 根放 .gitleaks.toml,允许列 rules 与 allow 规则。
# =============================================================================
name: Secret Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'      # 每周一 04:00 UTC 全仓深扫

permissions:
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }     # gitleaks 要看历史
      - name: Install gitleaks
        run: |
          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/
          gitleaks version
      - name: Determine scan range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "MODE=pr"   >> $GITHUB_OUTPUT
            echo "BASE=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
            echo "HEAD=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "MODE=full" >> $GITHUB_OUTPUT
          else
            echo "MODE=push" >> $GITHUB_OUTPUT
          fi
      # v2.5.1 关键修复 #1:scan step 用 continue-on-error 捕获真实结果到 steps.scan.outcome,
      # 不让 SARIF 上传等无关步骤污染"是否真扫到泄漏"这个判定。
      - name: Gitleaks scan
        id: scan
        continue-on-error: true
        run: |
          case "${{ steps.range.outputs.MODE }}" in
            pr)
              gitleaks detect --source . --no-banner --redact \
                --log-opts="${{ steps.range.outputs.BASE }}..${{ steps.range.outputs.HEAD }}" \
                --report-format sarif --report-path gitleaks.sarif
              ;;
            full|*)
              gitleaks detect --source . --no-banner --redact \
                --report-format sarif --report-path gitleaks.sarif
              ;;
          esac
      # v2.5.1 关键修复 #2:SARIF 上传也 continue-on-error。
      # 仓库没启用 Code Scanning(私有仓无 GHAS / 公开仓未 Set up)时,这步会 fail,
      # 但那只是"没记录到 Security 标签"的代价,不该等价于"找到了泄漏"。
      - name: Upload SARIF (best-effort,仓库无 Code Scanning 时静默跳过)
        if: always() && hashFiles('gitleaks.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
      # v2.5.1 关键修复 #3:PR 评论与 job-fail 严格键控 scan step 自己的 outcome,
      # 而非 job 整体的 failure() —— 后者会被 SARIF 上传失败带跑成误报。
      - name: Comment on PR if leaks found
        if: steps.scan.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s\n' \
            '🛑 **Secret Scan BLOCK** — 检测到可能的机密/凭证泄漏。' \
            '' \
            '请立即:' \
            '1. **轮换**所有可能泄漏的 token / key(不要只 force-push)' \
            '2. 用 `git filter-repo` 或 BFG 清理历史' \
            '3. 在 `.gitleaks.toml` 添加 allow 规则(仅当确认是 false positive 时)' \
            '' \
            '详情见 Security 标签 → Code scanning alerts → Tool: gitleaks。' \
            > /tmp/leak-comment.md
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body-file /tmp/leak-comment.md
      - name: Fail job if leaks found
        if: steps.scan.outcome == 'failure'
        run: |
          echo "::error::Gitleaks detected possible secrets — see PR comment & Security tab"
          exit 1

  secret-scan-gate:
    needs: gitleaks
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate
        run: |
          if [ '${{ needs.gitleaks.result }}' = 'failure' ]; then
            echo "::error::secret-scan-gate 失败 — 见 PR 评论与 Security 标签。"
            exit 1
          fi
          echo "✅ secret-scan-gate green."
